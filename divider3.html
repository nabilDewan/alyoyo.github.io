<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* 1. ADAPTIVE COLOR */
        :root {
            /* Neutral Gray @ 45% Opacity - Looks good on Dark & Light mode */
            --main-color: rgba(125, 125, 125, 0.45); 
        }

        /* 2. LAYOUT ENGINE */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; /* Fills the Notion block */
            overflow: hidden; /* No scrollbars */
            background-color: transparent; 
        }

        /* 3. PERFECT CENTERING */
        body {
            display: flex;
            align-items: center; /* Vertically centers the divider */
            justify-content: center; /* Horizontally centers the divider */
        }

        .divider-container {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0 4px; /* Safety padding */
            box-sizing: border-box;
            line-height: 0; /* Removes text spacing */
        }

        /* 4. DOTS */
        .dots {
            flex-grow: 1;
            height: 10px; 
            background-image: radial-gradient(
                circle, 
                var(--main-color) 1.5px, 
                transparent 2px
            );
            background-size: 14px 100%;
            background-repeat: repeat-x;
            background-position: center;
        }

        /* 5. ARROWS */
        .arrow-wrapper {
            display: flex;
            align-items: center;
            height: 10px; 
        }

        .arrow {
            color: var(--main-color);
            font-family: monospace; 
            font-size: 14px; 
            font-weight: lighter;
            line-height: 1;
            margin-top: -2px; /* Optical alignment */
        }
        
        .line-tail {
            width: 12px;
            height: 1px;
            background-color: var(--main-color);
            display: block; 
        }

    </style>
</head>
<body>

    <div class="divider-container">
        <div class="arrow-wrapper">
            <div class="line-tail"></div>
            <div class="arrow" style="margin-left: -2px;">&#9656;</div> 
        </div>

        <div class="dots"></div>

        <div class="arrow-wrapper">
            <div class="arrow" style="margin-right: -2px;">&#9666;</div> 
            <div class="line-tail"></div>
        </div>
    </div>

</body>
</html>
