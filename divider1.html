<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* 1. UNIVERSAL COLOR VARIABLE */
        :root {
            /* Neutral Gray @ 40% Opacity = Perfect for Dark & Light Mode */
            --main-color: rgba(125, 125, 125, 0.45); 
        }

        /* 2. RESET & LAYOUT */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* No scrollbars */
            background-color: transparent; /* Transparent background */
            display: flex;
            align-items: center;
            justify-content: center;
            /* Force the body to be only as tall as the content */
            height: 100vh; 
            width: 100%;
        }

        /* 3. THE CONTAINER */
        .divider-container {
            display: flex;
            align-items: center;
            width: 100%;
            /* Minimal height to crop whitespace */
            height: 20px; 
            gap: 8px; /* Space between arrows and dots */
            padding: 0 4px; /* Tiny side padding to prevent cut-off */
            box-sizing: border-box;
        }

        /* 4. THE DOTS (Auto-fitting) */
        .dots {
            flex-grow: 1; /* Takes up all available space */
            height: 10px;
            /* Creates the rounded dots */
            background-image: radial-gradient(
                circle, 
                var(--main-color) 2px, 
                transparent 2.5px
            );
            background-size: 14px 100%; /* Spacing between dots */
            background-repeat: repeat-x;
            background-position: center;
        }

        /* 5. THE ARROWS (Using CSS shapes for sharpness) */
        .arrow {
            display: flex;
            align-items: center;
            color: var(--main-color);
            font-family: monospace; /* Ensures consistent arrow shape */
            font-size: 16px;
            line-height: 1;
            font-weight: lighter;
            opacity: 0.8; /* Slightly more visible than dots */
        }
        
        /* Thin lines connected to arrows */
        .line-tail {
            width: 15px;
            height: 1px;
            background-color: var(--main-color);
            border-radius: 1px;
        }

    </style>
</head>
<body>

    <div class="divider-container">
        <div style="display:flex; align-items:center;">
            <div class="line-tail"></div>
            <div class="arrow" style="margin-left: -2px;">&#9656;</div> </div>

        <div class="dots"></div>

        <div style="display:flex; align-items:center;">
            <div class="arrow" style="margin-right: -2px;">&#9666;</div> <div class="line-tail"></div>
        </div>
    </div>

</body>
</html>
