<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* This color works harmoniously across both themes */
            --divider-color: rgba(120, 120, 120, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .divider-wrapper {
            width: 100%;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .dot-pattern {
            width: 100%;
            height: 10px;
            /* Radial gradient creates the circles dynamically */
            background-image: radial-gradient(
                circle, 
                var(--divider-color) 2.5px, 
                transparent 3px
            );
            background-size: 18px 100%; /* Adjust the 18px to change horizontal spacing */
            background-repeat: repeat-x;
            background-position: center;
        }

        /* Subtle accent lines at the very edges */
        .edge-accent {
            width: 20px;
            height: 1.5px;
            background-color: var(--divider-color);
            border-radius: 2px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="divider-wrapper">
        <div class="edge-accent"></div>
        <div class="dot-pattern"></div>
        <div class="edge-accent"></div>
    </div>

</body>
</html>
