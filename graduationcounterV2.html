<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Since Graduation</title>
    <style>
        /* 1. Remove all default spacing that causes Notion scrollbars */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            overflow: hidden; /* Prevents tiny scrollbars in Notion */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top to save space */
            padding: 10px; /* Minimal padding for edge breathing room */
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 100%;
        }

        h1 {
            font-size: clamp(1rem, 3vw, 1.4rem);
            margin-bottom: 12px;
            color: #666;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* 2. Optimized Grid for tight spaces */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns by default */
            gap: 8px;
            width: 100%;
        }

        .counter-box {
            border-radius: 12px;
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        /* Colors - Kept your original design */
        .days { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .hours { background: linear-gradient(135deg, #e5e7eb, #d1d5db); color: #1f2937; }
        .minutes { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .seconds { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }

        .number {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .label {
            font-size: clamp(0.6rem, 1.5vw, 0.75rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* 3. Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            h1 { color: #9ca3af; }
            .hours {
                background: linear-gradient(135deg, #374151, #1f2937);
                color: white;
            }
        }

        /* 4. Responsive adjustments for narrow Notion columns */
        @media (max-width: 480px) {
            .counter-grid {
                grid-template-columns: repeat(2, 1fr); /* 2x2 layout for small blocks */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Time since graduation!</h1>
        <div class="counter-grid">
            <div class="counter-box days">
                <div class="number" id="days">0</div>
                <div class="label">Days</div>
            </div>
            <div class="counter-box hours">
                <div class="number" id="hours">0</div>
                <div class="label">Hours</div>
            </div>
            <div class="counter-box minutes">
                <div class="number" id="minutes">0</div>
                <div class="label">Mins</div>
            </div>
            <div class="counter-box seconds">
                <div class="number" id="seconds">0</div>
                <div class="label">Secs</div>
            </div>
        </div>
    </div>

    <script>
        const graduationDate = new Date('2023-02-22T00:00:00');

        function updateCounter() {
            const currentTime = new Date();
            const difference = currentTime - graduationDate;

            if (difference < 0) return;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        updateCounter();
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
