<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        success: '#10b981',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for spreadsheet view */
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Initial Data Pre-populated from your Excel ---
        const INITIAL_MONTHS = ['April-May', 'May-June', 'June-July', 'July-August', 'August-September', 'September-October', 'October-November', 'November-December', 'December-January'];
        
        const INITIAL_INCOME = {
            'April-May': 3300, 'May-June': 2900, 'June-July': 2900, 'July-August': 2600,
            'August-September': 0, 'September-October': 0, 'October-November': 0, 'November-December': 0, 'December-January': 0
        };

        const INITIAL_EXPENSES = [
            { id: 1, source: 'Aqua', total: 500, allocations: { 'April-May': 150, 'May-June': 150, 'June-July': 100, 'July-August': 100, 'August-September': 45, 'September-October': 45 }, paid: {} },
            { id: 2, source: 'Shak', total: 200, allocations: { 'April-May': 100, 'May-June': 100 }, paid: {} },
            { id: 3, source: 'Meghna', total: 200, allocations: { 'April-May': 10, 'May-June': 10, 'June-July': 10, 'July-August': 10, 'August-September': 0 }, paid: {} },
            { id: 4, source: 'Barclys', total: 250, allocations: { 'April-May': 60, 'May-June': 60, 'June-July': 60, 'July-August': 60, 'August-September': 60, 'September-October': 60, 'October-November': 60, 'November-December': 60, 'December-January': 60 }, paid: {} },
            { id: 5, source: 'Shezan', total: 400, allocations: { 'April-May': 50, 'May-June': 90, 'June-July': 90, 'July-August': 90, 'August-September': 40, 'September-October': 40, 'October-November': 40, 'November-December': 40, 'December-January': 40 }, paid: {} },
            { id: 6, source: 'bby', total: 2500, allocations: { 'April-May': 350, 'May-June': 350, 'June-July': 700, 'July-August': 700 }, paid: {} },
            { id: 7, source: 'Vai', total: 1500, allocations: { 'April-May': 1000, 'May-June': 500 }, paid: {} },
        ];

        // --- Helper Components ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden ${className}`}>
                {children}
            </div>
        );

        // --- Main App Component ---
        function App() {
            // State
            const [view, setView] = useState('dashboard'); // 'dashboard' or 'spreadsheet'
            const [months, setMonths] = useState(INITIAL_MONTHS);
            const [incomes, setIncomes] = useState(INITIAL_INCOME);
            const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
            const [selectedMonth, setSelectedMonth] = useState(INITIAL_MONTHS[0]);

            // Utils
            const parseVal = (val) => {
                const parsed = parseFloat(val);
                return isNaN(parsed) ? 0 : parsed;
            };

            // Handlers
            const handleIncomeChange = (month, value) => {
                setIncomes(prev => ({ ...prev, [month]: parseVal(value) }));
            };

            const handleExpenseAllocationChange = (expenseId, month, value) => {
                setExpenses(prev => prev.map(exp => {
                    if (exp.id === expenseId) {
                        return {
                            ...exp,
                            allocations: { ...exp.allocations, [month]: parseVal(value) }
                        };
                    }
                    return exp;
                }));
            };

            const handleExpenseSourceChange = (expenseId, field, value) => {
                 setExpenses(prev => prev.map(exp => {
                    if (exp.id === expenseId) {
                        return { ...exp, [field]: field === 'total' ? parseVal(value) : value };
                    }
                    return exp;
                }));
            }

            const handleExpensePaidChange = (expenseId, month, isPaid) => {
                setExpenses(prev => prev.map(exp => {
                    if (exp.id === expenseId) {
                        return {
                            ...exp,
                            paid: { ...(exp.paid || {}), [month]: isPaid }
                        };
                    }
                    return exp;
                }));
            };

            const addNewSource = () => {
                const newId = Math.max(0, ...expenses.map(e => e.id)) + 1;
                setExpenses([...expenses, { id: newId, source: 'New Source', total: 0, allocations: {}, paid: {} }]);
            };

            // Derived Data
            const summaries = useMemo(() => {
                const data = {};
                months.forEach(month => {
                    const income = incomes[month] || 0;
                    const outgoing = expenses.reduce((sum, exp) => sum + (exp.allocations[month] || 0), 0);
                    data[month] = {
                        income,
                        outgoing,
                        remaining: income - outgoing
                    };
                });
                return data;
            }, [months, incomes, expenses]);


            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
                                        <i className="fa-solid fa-wallet text-xl"></i>
                                    </div>
                                    <h1 className="text-xl font-bold text-slate-800 tracking-tight">FinTracker</h1>
                                </div>
                                <div className="flex space-x-2 bg-slate-100 p-1 rounded-lg">
                                    <button 
                                        onClick={() => setView('dashboard')}
                                        className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${view === 'dashboard' ? 'bg-white shadow-sm text-primary' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        <i className="fa-solid fa-chart-pie mr-2"></i>Dashboard
                                    </button>
                                    <button 
                                        onClick={() => setView('spreadsheet')}
                                        className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${view === 'spreadsheet' ? 'bg-white shadow-sm text-primary' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        <i className="fa-solid fa-table mr-2 hidden sm:inline"></i>Spreadsheet
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {view === 'dashboard' ? (
                            <DashboardView 
                                months={months}
                                selectedMonth={selectedMonth}
                                setSelectedMonth={setSelectedMonth}
                                summary={summaries[selectedMonth]}
                                income={incomes[selectedMonth] || 0}
                                expenses={expenses}
                                handleIncomeChange={handleIncomeChange}
                                handleExpenseAllocationChange={handleExpenseAllocationChange}
                                handleExpensePaidChange={handleExpensePaidChange}
                                addNewSource={addNewSource}
                            />
                        ) : (
                            <SpreadsheetView 
                                months={months}
                                incomes={incomes}
                                expenses={expenses}
                                summaries={summaries}
                                handleIncomeChange={handleIncomeChange}
                                handleExpenseAllocationChange={handleExpenseAllocationChange}
                                handleExpensePaidChange={handleExpensePaidChange}
                                handleExpenseSourceChange={handleExpenseSourceChange}
                                addNewSource={addNewSource}
                            />
                        )}
                    </main>
                </div>
            );
        }

        // --- Dashboard View (Mobile Friendly) ---
        function DashboardView({ months, selectedMonth, setSelectedMonth, summary, income, expenses, handleIncomeChange, handleExpenseAllocationChange, handleExpensePaidChange, addNewSource }) {
            return (
                <div className="space-y-6 animate-fade-in">
                    {/* Month Selector */}
                    <div className="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-slate-100">
                        <button 
                            onClick={() => {
                                const idx = months.indexOf(selectedMonth);
                                if (idx > 0) setSelectedMonth(months[idx - 1]);
                            }}
                            className="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500"
                        >
                            <i className="fa-solid fa-chevron-left"></i>
                        </button>
                        <select 
                            value={selectedMonth}
                            onChange={(e) => setSelectedMonth(e.target.value)}
                            className="bg-transparent text-lg font-bold text-center text-slate-800 outline-none cursor-pointer appearance-none px-4"
                        >
                            {months.map(m => <option key={m} value={m}>{m} Tracker</option>)}
                        </select>
                        <button 
                            onClick={() => {
                                const idx = months.indexOf(selectedMonth);
                                if (idx < months.length - 1) setSelectedMonth(months[idx + 1]);
                            }}
                            className="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500"
                        >
                            <i className="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>

                    {/* Summary Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <Card className="p-6 border-l-4 border-l-success">
                            <p className="text-sm font-medium text-slate-500 mb-1">Total Income</p>
                            <h2 className="text-3xl font-bold text-slate-800">£{summary.income.toLocaleString()}</h2>
                        </Card>
                        <Card className="p-6 border-l-4 border-l-danger">
                            <p className="text-sm font-medium text-slate-500 mb-1">Total Outgoing</p>
                            <h2 className="text-3xl font-bold text-slate-800">£{summary.outgoing.toLocaleString()}</h2>
                        </Card>
                        <Card className={`p-6 border-l-4 ${summary.remaining >= 0 ? 'border-l-primary' : 'border-l-danger'}`}>
                            <p className="text-sm font-medium text-slate-500 mb-1">Remaining Balance</p>
                            <h2 className={`text-3xl font-bold ${summary.remaining >= 0 ? 'text-primary' : 'text-danger'}`}>
                                £{summary.remaining.toLocaleString()}
                            </h2>
                        </Card>
                    </div>

                    {/* Editor Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Income Editor */}
                        <Card className="p-6 lg:col-span-1 h-fit">
                            <div className="flex items-center gap-2 mb-4">
                                <i className="fa-solid fa-arrow-down text-success bg-success/10 p-2 rounded-lg"></i>
                                <h3 className="text-lg font-semibold">Income</h3>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-500 mb-2">Amount for {selectedMonth}</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">£</span>
                                    <input 
                                        type="number" 
                                        value={income || ''}
                                        onChange={(e) => handleIncomeChange(selectedMonth, e.target.value)}
                                        className="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                        placeholder="0"
                                    />
                                </div>
                            </div>
                        </Card>

                        {/* Outgoing Editor */}
                        <Card className="p-0 lg:col-span-2">
                            <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <i className="fa-solid fa-arrow-up text-danger bg-danger/10 p-2 rounded-lg"></i>
                                    <h3 className="text-lg font-semibold">Outgoings & Debts</h3>
                                </div>
                                <button onClick={addNewSource} className="text-sm font-medium text-primary hover:text-primary/80 transition-colors">
                                    <i className="fa-solid fa-plus mr-1"></i> Add Source
                                </button>
                            </div>
                            <div className="divide-y divide-slate-100 max-h-[500px] overflow-y-auto custom-scrollbar">
                                {expenses.map(expense => {
                                    const amount = expense.allocations[selectedMonth] || '';
                                    const isPaid = expense.paid?.[selectedMonth] || false;
                                    return (
                                        <div key={expense.id} className={`p-4 sm:p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-colors ${isPaid ? 'bg-slate-50/50' : 'hover:bg-slate-50'}`}>
                                            <div className="flex items-center gap-4 flex-1">
                                                <input 
                                                    type="checkbox"
                                                    checked={isPaid}
                                                    onChange={(e) => handleExpensePaidChange(expense.id, selectedMonth, e.target.checked)}
                                                    className="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer accent-primary"
                                                />
                                                <div className={isPaid ? 'opacity-50 line-through' : ''}>
                                                    <p className="font-semibold text-slate-800">{expense.source}</p>
                                                    <p className="text-xs text-slate-500">Total target: £{expense.total.toLocaleString()}</p>
                                                </div>
                                            </div>
                                            <div className="relative w-full sm:w-48">
                                                <span className={`absolute left-4 top-1/2 -translate-y-1/2 ${isPaid ? 'text-slate-300' : 'text-slate-400'}`}>£</span>
                                                <input 
                                                    type="number" 
                                                    value={amount}
                                                    onChange={(e) => handleExpenseAllocationChange(expense.id, selectedMonth, e.target.value)}
                                                    className={`w-full pl-8 pr-4 py-2 bg-white border rounded-lg outline-none transition-all ${isPaid ? 'border-slate-100 text-slate-400 bg-slate-50' : 'border-slate-200 focus:ring-2 focus:ring-danger focus:border-danger'}`}
                                                    placeholder="0"
                                                />
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </Card>
                    </div>
                </div>
            );
        }

        // --- Spreadsheet View (Excel Replica) ---
        function SpreadsheetView({ months, incomes, expenses, summaries, handleIncomeChange, handleExpenseAllocationChange, handleExpensePaidChange, handleExpenseSourceChange, addNewSource }) {
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-xl font-bold text-slate-800">Spreadsheet View</h2>
                            <p className="text-sm text-slate-500">Edit all months at once. Scroll horizontally to view future months.</p>
                        </div>
                        <button onClick={addNewSource} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition-colors">
                            <i className="fa-solid fa-plus mr-2"></i>Add Source
                        </button>
                    </div>

                    <Card className="overflow-hidden">
                        <div className="overflow-x-auto custom-scrollbar pb-4">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                    <tr>
                                        <th className="px-4 py-3 font-semibold w-40 sticky left-0 bg-slate-50 z-10 border-r border-slate-200 shadow-[10px_0_15px_-10px_rgba(0,0,0,0.05)]">SUMMARY</th>
                                        <th className="px-4 py-3 font-semibold text-center border-r border-slate-200">Total</th>
                                        {months.map(m => (
                                            <th key={m} className="px-4 py-3 font-semibold text-center min-w-[120px]">{m}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {/* Income Row */}
                                    <tr className="bg-emerald-50/30">
                                        <td className="px-4 py-3 font-semibold text-success sticky left-0 bg-emerald-50/90 border-r border-slate-200 shadow-[10px_0_15px_-10px_rgba(0,0,0,0.05)]">Income</td>
                                        <td className="px-4 py-3 text-center text-slate-400">-</td>
                                        {months.map(m => (
                                            <td key={`inc-${m}`} className="px-2 py-2">
                                                <input 
                                                    type="number"
                                                    value={incomes[m] || ''}
                                                    onChange={(e) => handleIncomeChange(m, e.target.value)}
                                                    className="w-full bg-white border border-slate-200 rounded p-1.5 text-center focus:ring-1 focus:ring-success outline-none"
                                                    placeholder="0"
                                                />
                                            </td>
                                        ))}
                                    </tr>
                                    {/* Outgoing Summary Row */}
                                    <tr className="bg-rose-50/30">
                                        <td className="px-4 py-3 font-semibold text-danger sticky left-0 bg-rose-50/90 border-r border-slate-200 shadow-[10px_0_15px_-10px_rgba(0,0,0,0.05)]">OUTGOING</td>
                                        <td className="px-4 py-3 text-center text-slate-400">-</td>
                                        {months.map(m => (
                                            <td key={`out-${m}`} className="px-4 py-3 text-center font-medium text-danger">
                                                {summaries[m].outgoing}
                                            </td>
                                        ))}
                                    </tr>
                                    {/* Remaining Row */}
                                    <tr className="bg-slate-50">
                                        <td className="px-4 py-3 font-bold sticky left-0 bg-slate-50 border-r border-slate-200 shadow-[10px_0_15px_-10px_rgba(0,0,0,0.05)]">Remaining</td>
                                        <td className="px-4 py-3 text-center text-slate-400">-</td>
                                        {months.map(m => (
                                            <td key={`rem-${m}`} className={`px-4 py-3 text-center font-bold ${summaries[m].remaining >= 0 ? 'text-primary' : 'text-danger'}`}>
                                                {summaries[m].remaining}
                                            </td>
                                        ))}
                                    </tr>
                                    
                                    {/* Divider */}
                                    <tr><td colSpan={months.length + 2} className="h-6 bg-slate-50/50 border-y border-slate-200"></td></tr>
                                    
                                    {/* Sources Rows */}
                                    {expenses.map(expense => (
                                        <tr key={expense.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="px-2 py-2 sticky left-0 bg-white border-r border-slate-200 shadow-[10px_0_15px_-10px_rgba(0,0,0,0.05)]">
                                                <input 
                                                    type="text"
                                                    value={expense.source}
                                                    onChange={(e) => handleExpenseSourceChange(expense.id, 'source', e.target.value)}
                                                    className="w-full bg-transparent border-none font-medium text-slate-700 p-1.5 focus:ring-1 focus:ring-slate-300 rounded outline-none"
                                                />
                                            </td>
                                            <td className="px-2 py-2 border-r border-slate-100">
                                                <input 
                                                    type="number"
                                                    value={expense.total || ''}
                                                    onChange={(e) => handleExpenseSourceChange(expense.id, 'total', e.target.value)}
                                                    className="w-24 mx-auto block bg-slate-50 border border-slate-200 rounded p-1.5 text-center font-medium focus:ring-1 focus:ring-primary outline-none"
                                                    placeholder="0"
                                                />
                                            </td>
                                            {months.map(m => {
                                                const isPaid = expense.paid?.[m] || false;
                                                return (
                                                    <td key={`exp-${expense.id}-${m}`} className="px-2 py-2">
                                                        <div className={`flex items-center bg-white border rounded p-1 transition-colors ${isPaid ? 'border-slate-200 bg-slate-50' : 'border-slate-200 focus-within:ring-1 focus-within:ring-primary'}`}>
                                                            <input 
                                                                type="checkbox"
                                                                checked={isPaid}
                                                                onChange={(e) => handleExpensePaidChange(expense.id, m, e.target.checked)}
                                                                className="ml-1 mr-1.5 cursor-pointer accent-primary shrink-0"
                                                                title="Mark as paid"
                                                            />
                                                            <input 
                                                                type="number"
                                                                value={expense.allocations[m] || ''}
                                                                onChange={(e) => handleExpenseAllocationChange(expense.id, m, e.target.value)}
                                                                className={`w-full bg-transparent text-center outline-none ${isPaid ? 'text-slate-400 line-through' : ''}`}
                                                                placeholder="0"
                                                            />
                                                        </div>
                                                    </td>
                                                )
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
