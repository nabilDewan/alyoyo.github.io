<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* 1. CONFIGURATION */
        :root {
            /* Neutral Gray @ 45% Opacity */
            --main-color: rgba(125, 125, 125, 0.45); 
        }

        /* 2. PAGE RESET - Removes all default browser spacing */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; /* Fills the container exactly */
            overflow: hidden; /* Zero scrollbars */
            background-color: transparent; 
        }

        /* 3. FLEX CONTAINER - Centers content with ZERO vertical buffer */
        body {
            display: flex;
            align-items: center; /* Vertically center */
            justify-content: center; /* Horizontally center */
        }

        .divider-container {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0 2px; /* Safety padding for edges */
            box-sizing: border-box;
            line-height: 0; /* Kills text height spacing */
        }

        /* 4. THE DOTS */
        .dots {
            flex-grow: 1;
            height: 8px; /* Slightly thinner for a tighter look */
            background-image: radial-gradient(
                circle, 
                var(--main-color) 1.5px, /* Dot size */
                transparent 2px /* Spacing */
            );
            background-size: 12px 100%; /* Distance between dots */
            background-repeat: repeat-x;
            background-position: center;
        }

        /* 5. THE ARROWS - "Zero Gravity" text styling */
        .arrow-wrapper {
            display: flex;
            align-items: center;
            height: 10px; /* Forces specific height */
        }

        .arrow {
            color: var(--main-color);
            font-family: monospace; 
            font-size: 14px; /* Reduced slightly to fit tight spaces */
            font-weight: lighter;
            line-height: 1; /* Tighter line height */
            margin-top: -2px; /* Visual optical correction to align with dots */
        }
        
        .line-tail {
            width: 12px;
            height: 1px;
            background-color: var(--main-color);
            display: block; /* Ensures it acts as a solid box */
        }

    </style>
</head>
<body>

    <div class="divider-container">
        <div class="arrow-wrapper">
            <div class="line-tail"></div>
            <div class="arrow" style="margin-left: -2px;">&#9656;</div> 
        </div>

        <div class="dots"></div>

        <div class="arrow-wrapper">
            <div class="arrow" style="margin-right: -2px;">&#9666;</div> 
            <div class="line-tail"></div>
        </div>
    </div>

</body>
</html>
