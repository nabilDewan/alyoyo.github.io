<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#4f46e5', success: '#10b981', danger: '#ef4444' } } } }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIpNvwyyT1NQL-DgKQWOcne_gP26PQ6ew",
            authDomain: "fintracker-b744b.firebaseapp.com",
            projectId: "fintracker-b744b",
            storageBucket: "fintracker-b744b.firebasestorage.app",
            messagingSenderId: "183431361931",
            appId: "1:183431361931:web:eea920505972430a056b8e",
            measurementId: "G-4WHT6VGV3S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fsDb = db;
        window.fsDoc = doc;
        window.fsSetDoc = setDoc;
        window.fsOnSnapshot = onSnapshot;

        signInAnonymously(auth).then(() => {
            if (window.startApp) window.startApp(auth.currentUser.uid);
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const USERS = { 'alice': 'pass123', 'bob': 'pass123', 'charlie': 'pass123', 'family': 'family123' };

        function App() {
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ incomes: {}, expenses: [] });
            const isLoaded = useRef(false);

            const save = async (newData) => {
                const docRef = window.fsDoc(window.fsDb, 'users', user, 'data', 'main');
                await window.fsSetDoc(docRef, newData, { merge: true });
            };

            useEffect(() => {
                if (!user) return;
                const unsub = window.fsOnSnapshot(window.fsDoc(window.fsDb, 'users', user, 'data', 'main'), (snap) => {
                    if (snap.exists()) setData(snap.data());
                    isLoaded.current = true;
                });
                return unsub;
            }, [user]);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <form className="bg-white p-8 rounded-xl shadow-md w-full max-w-sm" onSubmit={(e) => {
                            e.preventDefault();
                            const u = e.target.user.value.toLowerCase();
                            const p = e.target.pass.value;
                            if (USERS[u] === p) setUser(u);
                            else alert('Invalid Login');
                        }}>
                            <h2 className="text-xl font-bold mb-4">Login</h2>
                            <input name="user" className="w-full border p-2 mb-2 rounded" placeholder="Username" required />
                            <input name="pass" type="password" className="w-full border p-2 mb-4 rounded" placeholder="Password" required />
                            <button className="w-full bg-primary text-white py-2 rounded">Login</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="p-6">
                    <h1 className="font-bold text-2xl mb-4">FinTracker: {user}</h1>
                    <button onClick={() => setUser(null)} className="text-danger underline">Logout</button>
                    {/* Add your main dashboard components here, using setData to update and save */}
                </div>
            );
        }

        window.startApp = (uid) => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
